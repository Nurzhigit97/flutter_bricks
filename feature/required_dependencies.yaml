# Добавь эти зависимости в pubspec.yaml своего проекта (в секцию dependencies).
# После `mason make app` скопируй нужные строки в свой pubspec.yaml и выполни flutter pub get.

dependencies:
  flutter:
    sdk: flutter

  get_it: ^9.2.1
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5
  json_annotation: ^4.11.0
  freezed_annotation: ^3.1.0
  # Network & API
  dio: ^5.4.0
  dartz: ^0.10.1

  # Routing
  auto_route: ^11.1.0

  # UI & utils
  google_fonts: ^8.0.2
  intl: ^0.20.2
  flutter_easyloading: ^3.0.5
  flutter_screenutil: ^5.0.0
  flutter_localizations:
    sdk: flutter
  flutter_svg: ^2.0.9
  lottie: ^3.0.0
  shimmer: ^3.0.0
  animations: ^2.0.11
  flutter_json_view: ^1.1.5
  fluttertoast: ^9.0.0
  url_launcher: ^6.2.0
  html: ^0.15.4
  collection: ^1.18.0
  permission_handler: ^12.0.1
  flutter_native_splash: ^2.4.7

  # Storage & paths
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^10.0.0
  path_provider: ^2.1.0

  # Deep links & app info
  app_links: ^7.0.0
  package_info_plus: ^9.0.1

  # Media & content
  cached_network_image: ^3.3.0
  flutter_cache_manager: ^3.3.0
  photo_view: ^0.15.0
  youtube_player_flutter: ^9.0.0
  webview_flutter: ^4.4.0
  flutter_markdown: ^0.7.7+1
  flutter_markdown_latex: ^0.3.4
  markdown: ^7.0.0
  no_screenshot: ^1.1.0

  # PDF (опционально)
  syncfusion_flutter_core: ^33.1.46
  syncfusion_flutter_pdfviewer: ^33.1.46

  # Connectivity
  connectivity_plus: ^7.1.0

  bloc: ^9.1.0
  finik_sdk: ^3.2.0
  firebase_core: ^3.8.1
  firebase_messaging: ^15.2.5
  flutter_local_notifications: ^21.0.0

dev_dependencies:
  # Генерация кода для auto_route и др.
  build_runner: ^2.4.13
  auto_route_generator: ^10.2.4
  freezed: ^3.2.5
  json_serializable: ^6.9.4

flutter:
  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
