# Добавь эти зависимости в pubspec.yaml своего проекта (в секцию dependencies).
# После `mason make app` скопируй нужные строки в свой pubspec.yaml и выполни flutter pub get.

dependencies:
  flutter:
    sdk: flutter

  get_it: ^9.2.1
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5
  json_annotation: ^4.11.0
  freezed_annotation: ^3.1.0

  # Network & API
  dio: ^5.4.0
  dartz: ^0.10.1

  # Routing
  auto_route: ^11.1.0

  # UI & utils
  google_fonts: ^8.0.2
  intl: ^0.20.2
  flutter_easyloading: ^3.0.5
  flutter_screenutil: ^5.0.0
  flutter_localizations:
    sdk: flutter
  flutter_svg: ^2.0.9
  lottie: ^3.0.0
  shimmer: ^3.0.0
  animations: ^2.0.11
  flutter_json_view: ^1.1.5
  fluttertoast: ^9.0.0
  url_launcher: ^6.2.0
  html: ^0.15.4
  logging: ^1.2.0
  collection: ^1.18.0
  permission_handler: ^12.0.1
  flutter_native_splash: ^2.4.7

  # Storage & paths
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^10.0.0
  path_provider: ^2.1.0

  # Deep links & app info
  app_links: ^7.0.0
  package_info_plus: ^9.0.1

  # Media & content
  cached_network_image: ^3.3.0
  flutter_cache_manager: ^3.3.0
  photo_view: ^0.15.0
  youtube_player_flutter: ^9.0.0
  webview_flutter: ^4.4.0
  flutter_markdown: ^0.7.7+1
  flutter_markdown_latex: ^0.3.4
  markdown: ^7.0.0
  no_screenshot: ^1.1.0

  # PDF (опционально)
  syncfusion_flutter_core: ^33.1.46
  syncfusion_flutter_pdfviewer: ^33.1.46

  # Connectivity
  connectivity_plus: ^7.1.0
  bloc: ^9.1.0

dev_dependencies:
  # Генерация кода для auto_route и др.
  build_runner: ^2.4.0
  auto_route_generator: ^10.5.0
  freezed: ^3.2.5
  json_serializable: ^6.13.1
  flutter_launcher_icons: ^0.14.3

# -----------------------------------------------------------------------------
# Launcher-иконка приложения (flutter_launcher_icons).
# После изменений запустить:
#   dart run flutter_launcher_icons
# -----------------------------------------------------------------------------
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  remove_alpha_ios: true

  image_path: "assets/icon/app_icon.png"

  # Android 8.0+ adaptive icons.
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

  # Минимальная версия Android, для которой создавать adaptive icons (по умолчанию 26+).
  min_sdk_android: 21

  # web: false
  # windows: false
  # macos: false

# -----------------------------------------------------------------------------
# Splash-экран (flutter_native_splash).
# После изменений запустить:
#   dart run flutter_native_splash:create
# -----------------------------------------------------------------------------
flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#101828"

  image: assets/images/png/splash_light.png
  image_dark: assets/images/png/splash_dark.png

  # Тянем лого на большую долю экрана, как на макете.
  fullscreen: false

  android_12:
    color: "#FFFFFF"
    color_dark: "#101828"
    image: assets/images/png/splash_light.png
    image_dark: assets/images/png/splash_dark.png

  android: true
  ios: true
  web: false

  # Таглайн "Работай, когда хочешь" внизу экрана.
  # Раскомментируйте и положите PNG после того, как подготовите ассеты
  # (для тёмной/светлой темы текст должен быть соответствующего цвета).
  branding: assets/images/png/branding_light.png
  branding_dark: assets/images/png/branding_dark.png
  branding_mode: bottom
  branding_bottom_padding: 24

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/png/
    - assets/icon/
  # fonts:
  #   - family: MyFont
  #     fonts:
  #       - asset: assets/fonts/MyFont.ttf