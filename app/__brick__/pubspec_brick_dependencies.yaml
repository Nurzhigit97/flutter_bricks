# Добавь эти зависимости в pubspec.yaml своего проекта (в секцию dependencies).
# После `mason make app` скопируй нужные строки в свой pubspec.yaml и выполни flutter pub get.

dependencies:
  # DI & state
  get_it: ^7.6.0
  flutter_bloc: ^8.1.0
  equatable: ^2.0.5

  # Network & API
  dio: ^5.4.0
  dartz: ^0.10.1

  # Routing
  auto_route: ^7.8.0

  # UI & utils
  google_fonts: ^6.1.0
  intl: ^0.19.0
  flutter_easyloading: ^3.0.5
  flutter_svg: ^2.0.9
  lottie: ^3.0.0
  shimmer: ^3.0.0
  animations: ^2.0.11
  flutter_json_view: ^0.4.2
  fluttertoast: ^8.2.4
  url_launcher: ^6.2.0
  html: ^0.15.4
  logging: ^1.2.0
  collection: ^1.18.0
  permission_handler: ^12.0.1

  # Storage & paths
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  path_provider: ^2.1.0

  # Firebase (опционально — если используешь)
  firebase_core: ^2.24.0
  firebase_analytics: ^10.7.0
  firebase_auth: ^4.15.0
  firebase_messaging: ^14.7.0
  firebase_crashlytics: ^3.4.0
  flutter_local_notifications: ^17.0.0

  # Deep links & app info
  app_links: ^6.0.0
  package_info_plus: ^5.0.0

  # Media & content
  cached_network_image: ^3.3.0
  flutter_cache_manager: ^3.3.0
  photo_view: ^0.14.0
  youtube_player_flutter: ^9.0.0
  webview_flutter: ^4.4.0
  flutter_markdown: ^0.6.18
  flutter_markdown_latex: ^0.2.0
  markdown: ^7.0.0
  no_screenshot: ^0.0.2

  # PDF (опционально)
  syncfusion_flutter_core: ^24.1.0
  syncfusion_flutter_pdfviewer: ^24.1.0

  # Connectivity
  connectivity_plus: ^5.0.0

dev_dependencies:
  # Генерация кода для auto_route и др.
  build_runner: ^2.4.0
  auto_route_generator: ^7.0.0
